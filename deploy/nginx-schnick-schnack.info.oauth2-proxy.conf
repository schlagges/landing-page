server {
    listen 80;
    server_name schnick-schnack.info www.schnick-schnack.info;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name schnick-schnack.info www.schnick-schnack.info;

    ssl_certificate /etc/letsencrypt/live/schnick-schnack.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/schnick-schnack.info/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /oauth2/ {
        proxy_pass http://127.0.0.1:4180;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /oauth2/auth {
        proxy_pass http://127.0.0.1:4180;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
    }

    location / {
        auth_request /oauth2/auth;
        error_page 401 = /oauth2/sign_in;
        auth_request_set $portal_user $upstream_http_x_auth_request_user;
        auth_request_set $portal_roles $upstream_http_x_auth_request_groups;

        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Schnick-Schnack-Roles $portal_roles;
        proxy_set_header X-Forwarded-Roles $portal_roles;
        proxy_set_header X-Schnick-Schnack-User $portal_user;
        proxy_set_header X-Forwarded-User $portal_user;
    }

    location /ws/health {
        auth_request /oauth2/auth;
        error_page 401 = /oauth2/sign_in;
        auth_request_set $portal_user $upstream_http_x_auth_request_user;
        auth_request_set $portal_roles $upstream_http_x_auth_request_groups;

        proxy_pass http://127.0.0.1:8090/ws/health;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Schnick-Schnack-Roles $portal_roles;
        proxy_set_header X-Forwarded-Roles $portal_roles;
        proxy_set_header X-Schnick-Schnack-User $portal_user;
        proxy_set_header X-Forwarded-User $portal_user;
        proxy_read_timeout 3600;
    }
}
